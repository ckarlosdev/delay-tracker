services:
  db-job:
    image: mysql:8.0
    container_name: db-delay-tracker
    restart: always
    environment:
      MYSQL_DATABASE: delay_tracker_db
      MYSQL_ROOT_PASSWORD: ${DB_PASS_ROOT}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "127.0.0.1:3309:3306"
    networks:
      - delay-tracker-net
    volumes:
      - ./mysql_data:/var/lib/mysql

  job-management-service:
    build: .
    container_name: delay-tracker-service
    depends_on:
      - db-delay-tracker
    restart: always
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-delay-tracker:3306/delay_tracker_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - APPLICATION_SECURITY_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - UPLOAD_DIR=/app/uploads/signatures/
      - APP_BASE_URL=https://api-gateway-px44.onrender.com
    volumes:
      - ~/uploads/signatures:/app/uploads/delay-log/signatures/
    networks:
      - delay-tracker-net

networks:
  job-net:
    driver: bridge